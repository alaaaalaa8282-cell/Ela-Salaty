name: Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - run: chmod +x gradlew

      - name: Fix Gradle Wrapper JAR
        run: |
          curl -Lo gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias elasalaty \
            -keyalg RSA -keysize 2048 \
            -validity 9125 \
            -keystore elasalaty.jks \
            -storepass elasalaty123 \
            -keypass elasalaty123 \
            -dname "CN=ElaSalaty,O=Islamic,C=EG" \
            -noprompt

      - name: Build APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/elasalaty.jks \
            -Pandroid.injected.signing.store.password=elasalaty123 \
            -Pandroid.injected.signing.key.alias=elasalaty \
            -Pandroid.injected.signing.key.password=elasalaty123

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "إلى الصلاة - إصدار ${{ github.run_number }}"
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
