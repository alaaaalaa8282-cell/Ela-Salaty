name: 🕌 بناء تطبيق محمد عبد العظيم الطويل الاسلامى

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4

      - name: ☕ إعداد جافا 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: 🔧 تشغيل gradlew
        run: chmod +x gradlew

      - name: 🏗️ بناء تطبيق الى صلاتى
        run: ./gradlew assembleRelease

      - name: 📦 حفظ ملف التطبيق
        uses: actions/upload-artifact@v4
        with:
          name: الى-صلاتى-Mohamed-Abdelazim
          path: app/build/outputs/apk/release/*.apk
